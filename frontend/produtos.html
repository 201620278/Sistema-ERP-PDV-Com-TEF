<!--
  Fragmento de referência da aba Produtos.
  A tela é montada dinamicamente em frontend/js/produtos.js (renderProdutos / showProdutoModal).
-->
<div class="row mb-3 g-3">
  <div class="col-md-6">
    <!-- Card estoque baixo: id="cardEstoqueBaixoProdutos" -->
  </div>
  <div class="col-md-6">
    <div class="card-dashboard card-vencimentos" id="cardVencimentosProdutos">
      <div class="card-icon">⏰</div>
      <div class="card-info">
        <h3>Vencimentos</h3>
        <p>
          <strong id="qtdProdutosVencidos">0</strong> vencidos |
          <strong id="qtdProdutosProximos">0</strong> próximos
        </p>
        <button type="button" class="btn btn-warning btn-sm" onclick="abrirModalVencimentosProdutos()">
          Ver produtos
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Campos no modal de produto (showProdutoModal) -->
<div class="form-row">
  <div class="form-group">
    <label>
      <input type="checkbox" id="controlar_validade">
      Controlar validade deste produto
    </label>
  </div>
  <div class="form-group">
    <label for="data_validade">Data de validade</label>
    <input type="date" id="data_validade" class="form-control">
  </div>
  <div class="form-group">
    <label for="lote">Lote</label>
    <input type="text" id="lote" class="form-control" placeholder="Ex: LOTE001">
  </div>
  <div class="form-group">
    <label for="dias_alerta_validade">Alertar com quantos dias?</label>
    <input type="number" id="dias_alerta_validade" class="form-control" value="30" min="1">
  </div>
</div>

<!-- Modal vencimentos: injetado por inicializarModalVencimentosProdutos() em produtos.js -->
